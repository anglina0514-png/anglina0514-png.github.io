<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>许智宁 | 个人主页与作品集 - AI 内容操盘手</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* 核心科技感变量 */
        :root {
            --primary: #2563eb;       /* 科技蓝 */
            --secondary: #8b5cf6;     /* 梦幻紫 */
            --bg: #f8fafc;            /* 极客灰底色 */
            --surface: #ffffff;       /* 卡片纯白 */
            --text-main: #0f172a;     /* 深色主字 */
            --text-muted: #64748b;    /* 质感灰字 */
        }

        html { scroll-behavior: smooth; font-family: 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* ⚠️ 1. 悬浮毛玻璃导航栏 ⚠️ */
        .glass-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
            display: flex; justify-content: center; padding: 15px 0;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
        .nav-links a { 
            color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 1.05em; 
            padding: 8px 18px; border-radius: 30px; cursor: pointer; position: relative; overflow: hidden;
            transition: color 0.4s ease;
        }
        /* 导航栏滑过动画 */
        .nav-links a::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            z-index: -1; transform: scaleX(0); transform-origin: right; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px; 
        }
        .nav-links a:hover { color: var(--primary); background: rgba(37, 99, 235, 0.08); }
        .nav-links a.active-nav { color: white; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); background: transparent;}
        .nav-links a.active-nav::before { transform: scaleX(1); transform-origin: left; }

        /* 主体容器留出导航栏空间 */
        .main-container { max-width: 1000px; margin: 100px auto 40px auto; padding: 0 20px; }
        
        /* ⚠️ 2. 头部信息与头像动效 ⚠️ */
        header { text-align: center; padding: 50px 0 40px 0; background: var(--surface); border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); margin-bottom: 40px; position: relative; overflow: hidden; }
        header::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, rgba(255,255,255,0) 60%); z-index: 0; pointer-events: none; }
        
        .avatar { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(37,99,235,0.15); position: relative; z-index: 1; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .avatar:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 15px 35px rgba(37,99,235,0.25); }
        
        h1 { font-size: 2.8em; margin: 15px 0 5px; color: var(--text-main); font-weight: 800; letter-spacing: 2px; position: relative; z-index: 1; }
        .subtitle { font-size: 1.25em; color: var(--text-muted); margin: 0; position: relative; z-index: 1; font-weight: 400; }
        .subtitle-highlight { background: linear-gradient(120deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight:bold; }

        /* ⚠️ 3. 页面切换高级进场动画 ⚠️ */
        .page-section { display: none; background: var(--surface); padding: 45px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); margin-bottom: 30px; transform-origin: top center; }
        .page-section.active-page { display: block; animation: scaleFadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
