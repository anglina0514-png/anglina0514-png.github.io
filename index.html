<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>许智宁 | 全栈内容操盘手</title>
    <meta property="og:title" content="许智宁 | 全栈内容操盘手主页">
    <meta property="og:description" content="深圳大学 | 千万级自媒体运营 | AIGC视觉与3D动画 | 券商级传媒行研。">
    <meta property="og:image" content="http://xuzhining.top/xu-photo.jpg">
    <meta property="og:url" content="http://xuzhining.top">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* =========================================
           1. ☀️ 白天模式 (极简、轻盈、柔和圆润) 
           ========================================= */
        :root {
            --bg: #f4f7f9;            
            --surface: rgba(255, 255, 255, 0.95);       
            --text-main: #1e293b;     
            --text-muted: #64748b;    
            --primary: #2563eb;       
            --secondary: #8b5cf6;
            --border-color: rgba(226, 232, 240, 0.8);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            --card-radius: 20px;
            --particle-color: rgba(37, 99, 235, 0.2);
            --particle-line: rgba(37, 99, 235, 0.1);
        }

        /* =========================================
           2. 🌙 夜间模式 (赛博、霓虹、硬朗线条)
           ========================================= */
        body.cyberpunk {
            --bg: #07090f;            
            --surface: rgba(12, 16, 24, 0.85);       
            --text-main: #f1f5f9;     
            --text-muted: #94a3b8;    
            --primary: #00f3ff;       
            --secondary: #ff00ff;     
            --border-color: rgba(0, 243, 255, 0.3);
            --shadow: 0 0 20px rgba(0, 243, 255, 0.15), inset 0 0 15px rgba(255, 0, 255, 0.05);
            --card-radius: 8px; /* 赛博模式边角更硬朗 */
            --particle-color: rgba(0, 243, 255, 0.5);
            --particle-line: rgba(255, 0, 255, 0.3);
        }

        /* 🌙 赛博专属 CRT 扫描线纹理 */
        body.cyberpunk::after {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 99999; background-size: 100% 2px, 3px 100%; pointer-events: none; opacity: 0.8;
        }

        /* --- 丝滑全局过渡 --- */
        html { scroll-behavior: smooth; font-family: 'Helvetica Neue', 'PingFang SC', sans-serif; }
        body, .page-section, header, .data-card, .nav-links a, .portfolio-item, .fab-btn, .file-link { 
            transition: background-color 0.8s ease, color 0.8s ease, border-color 0.8s ease, box-shadow 0.8s ease, border-radius 0.8s ease; 
        }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        /* --- 背景交互 Canvas --- */
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }

        /* --- 毛玻璃导航栏 --- */
        .glass-nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            background: var(--surface); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color); display: flex; justify-content: center; padding: 15px 0;
            box-shadow: var(--shadow); 
        }
        .nav-links { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 20px; align-items: center;}
        .nav-links a { 
            color: var(--text-muted); text-decoration: none; font-weight: 600; font-size: 1.05em; 
            padding: 8px 18px; border-radius: 30px; cursor: pointer; position: relative; overflow: hidden;
        }
        .nav-links a::before { 
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            z-index: -1; transform: scaleX(0); transform-origin: right; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 30px; 
        }
        .nav-links a:hover { color: var(--primary); }
        .nav-links a.active-nav { color: #fff; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); background: transparent;}
        body.cyberpunk .nav-links a.active-nav { color: #000; text-shadow: none; box-shadow: 0 0 15px var(--primary); }
        .nav-links a.active-nav::before { transform: scaleX(1); transform-origin: left; }

        .theme-toggle { margin-left: 15px; cursor: pointer; color: var(--text-main); font-size: 1.4em; }
        .theme-toggle:hover { color: var(--primary); }

        .main-container { max-width: 1000px; margin: 100px auto 40px auto; padding: 0 20px; }
        
        /* --- 头部信息 --- */
        header { text-align: center; padding: 50px 20px 40px 20px; background: var(--surface); border: 1px solid var(--border-color); border-radius: var(--card-radius); box-shadow: var(--shadow); margin-bottom: 40px; position: relative; backdrop-filter: blur(10px); }
        .avatar { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--surface); box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        body.cyberpunk .avatar { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,243,255,0.4); filter: contrast(1.1); }
        .avatar:hover { transform: scale(1.08) rotate(5deg); }
        
        h1 { font-size: 2.8em; margin: 15px 0 5px; color: var(--text-main); font-weight: 800; letter-spacing: 2px; }
        
        .typewriter-box { font-family: 'Courier New', Courier, monospace; font-size: 1.15em; font-weight: bold; color: var(--primary); min-height: 28px; margin: 10px 0 20px 0; }
        body.cyberpunk .typewriter-box { text-shadow: 0 0 8px var(--primary); }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background-color: var(--primary); vertical-align: bottom; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* ⚠️ 3. 动态数据看板核心样式 ⚠️ */
        .data-dashboard { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 25px; transition: opacity 0.4s ease, transform 0.4s ease; }
        .data-card {
            background: var(--bg); padding: 20px 25px; border-radius: var(--card-radius); border: 1px solid var(--border-color);
            text-align: center; display: flex; flex-direction: column; flex: 1; min-width: 160px;
        }
        body.cyberpunk .data-card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); }
        .data-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--primary); }
        .data-card strong { font-size: 1.8em; color: var(--primary); font-weight: 800; line-height: 1.1; }
        body.cyberpunk .data-card strong { text-shadow: 0 0 12px var(--primary); }
        .data-card span { font-size: 0.85em; color: var(--text-muted); font-weight: 600; margin-top: 5px; }

        /* --- 页面切换容器 --- */
        .page-section { display: none; background: var(--surface); border: 1px solid var(--border-color); padding: 45px; border-radius: var(--card-radius); box-shadow: var(--shadow); margin-bottom: 30px; backdrop-filter: blur(10px); }
        .page-section.active-page { display: block; animation: smoothFadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        @keyframes smoothFadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }

        h2 { color: var(--text-main); font-size: 2em; margin-top: 0; border-bottom: 1px dashed var(--border-color); padding-bottom: 15px; display: flex; align-items: center; gap: 12px; }
        h2 i { color: var(--primary); }
        body.cyberpunk h2 i { text-shadow: 0 0 10px var(--primary); }

        /* --- 履历列表交互 --- */
        .content-list { margin-top: 25px; }
        .content-item { padding: 25px; border-radius: 16px; background: rgba(0,0,0,0.02); border: 1px solid var(--border-color); margin-bottom: 24px; position: relative; overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        body.cyberpunk .content-item { background: rgba(255,255,255,0.02); }
        .content-item::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: linear-gradient(to bottom, var(--primary), var(--secondary)); transform: scaleY(0); transition: transform 0.3s ease; transform-origin: bottom; }
        .content-item:hover { transform: translateX(6px); box-shadow: var(--shadow); border-color: var(--primary); }
        .content-item:hover::before { transform: scaleY(1); }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 12px; border-bottom: 1px dashed var(--border-color); padding-bottom: 10px; }
        .item-header h3 { margin: 0; font-size: 1.25em; display: flex; align-items: center; gap: 8px; }
        .item-header .meta { font-size: 0.85em; font-weight: 600; background: rgba(100,116,139,0.1); padding: 4px 12px; border-radius: 20px; color: var(--primary);}

        /* --- 作品集网格 --- */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 25px; }
        .portfolio-item { background: var(--surface); border-radius: var(--card-radius); overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; }
        .portfolio-item:hover { transform: translateY(-5px); box-shadow: var(--shadow); border-color: var(--secondary); }
        .portfolio-item img { width: 100%; height: 180px; object-fit: cover; transition: transform 0.6s ease; filter: brightness(0.95); }
        body.cyberpunk .portfolio-item img { filter: brightness(0.8) contrast(1.2); }
        .portfolio-item:hover img { transform: scale(1.05); filter: brightness(1); }
        .portfolio-item-content { padding: 15px; position: relative; background: var(--surface); z-index: 2; }
        .portfolio-item h3 { margin: 0; font-size: 1.1em; }

        /* --- 视频区 --- */
        .video-wrapper { margin-top: 30px; background: rgba(0,0,0,0.02); padding: 20px; border-radius: var(--card-radius); border: 1px solid var(--border-color); }
        body.cyberpunk .video-wrapper { background: rgba(0,243,255,0.02); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; margin-top: 15px; border: 1px solid #333;}
        body.cyberpunk .video-container { box-shadow: 0 0 20px rgba(0,243,255,0.2); border-color: var(--border-color); }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; object-fit: cover;}

        /* --- 文件下载卡片 --- */
        .ppt-downloads { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .file-link {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface); padding: 16px 20px; border-radius: 12px; font-weight: bold; text-decoration: none; 
            border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer;
        }
        .file-link.ppt i.icon-type { color: #dc2626; }
        .file-link.pdf i.icon-type { color: #ea580c; }
        body.cyberpunk .file-link.ppt i.icon-type { color: #ff4757; text-shadow: 0 0 10px #ff4757; }
        body.cyberpunk .file-link.pdf i.icon-type { color: #ffa502; text-shadow: 0 0 10px #ffa502; }
        .file-link:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: var(--primary); color: var(--primary); }
        .file-link i.icon-type { font-size: 1.4em; margin-right: 12px; }

        /* --- 悬浮操作台 --- */
        .fab-container { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 9999; }
        .fab-btn {
            width: 55px; height: 55px; border-radius: 50%; background: var(--surface);
            display: flex; align-items: center; justify-content: center; color: var(--text-main); font-size: 1.4em; text-decoration: none;
            box-shadow: var(--shadow); border: 1px solid var(--border-color); cursor: pointer;
        }
        .fab-btn.resume-btn { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; border: none; }
        body.cyberpunk .fab-btn.resume-btn { box-shadow: 0 0 20px var(--primary); color: #fff; text-shadow: 0 0 5px #fff; }
        .fab-btn:hover { transform: scale(1.1) translateY(-3px); box-shadow: var(--shadow); color: var(--primary); border-color: var(--primary); }

        footer { text-align: center; padding: 40px 0 80px 0; color: var(--text-muted); font-size: 0.9em; font-family: monospace;}
        
        @media (max-width: 768px) {
            .main-container { margin-top: 120px; }
            .page-section { padding: 25px; }
            .data-card { padding: 12px; width: calc(50% - 20px); min-width: auto; }
            .data-card strong { font-size: 1.4em; }
            .fab-container { bottom: 20px; right: 20px; }
        }

        /* 脉冲反馈动效 */
        .click-pulse { animation: cyberIconPulse 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important; }
        .btn-click-pulse { animation: btnPressDown 0.3s ease-out forwards !important; }
        @keyframes cyberIconPulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(0.7); color: var(--secondary); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }
        @keyframes btnPressDown { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.95); } }
    </style>
</head>

            <i class="fas fa-moon theme-toggle" id="theme-icon" onclick="toggleTheme()" title="切换 UI 模式"></i>
        </div>
    </nav>
